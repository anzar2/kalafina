[Settings]
language = en
folder = ~/.config/wallpapers
monitors = All
wallpaper = ~/.config/wallpapers/4k-Wallpaper-Windows-11-scaled.jpg
show_path_in_tooltip = True
backend = swww
fill = fill
sort = name
color = #ffffff
subfolders = False
all_subfolders = False
show_hidden = False
show_gifs_only = False
zen_mode = False
post_command = ~/.config/quickshell/scripts/waypaper_postcommand.sh $wallpaper
number_of_columns = 3
swww_transition_type = any
swww_transition_step = 63
swww_transition_angle = 0
swww_transition_duration = 2
swww_transition_fps = 60
mpvpaper_sound = False
mpvpaper_options = 
use_xdg_state = False
stylesheet = $HOME/.config/waypaper/style.css

